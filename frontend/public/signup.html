<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Email Assistant</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">✉️</div>
        <h1>Create Account</h1>
        <p>Get started with your Email Assistant</p>
      </div>

      <div id="errorAlert" class="error-alert"></div>
      <div id="successAlert" class="success-alert"></div>

      <form id="signupForm">
        <div class="form-group-auth">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group-auth">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
          <div class="password-strength">
            <div class="password-strength-bar" id="passwordStrengthBar"></div>
          </div>
          <div class="password-hint" id="passwordHint">
            At least 8 characters, 1 uppercase, 1 lowercase, 1 number
          </div>
        </div>

        <div class="form-group-auth">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
        </div>

        <div class="checkbox-group">
          <input
            type="checkbox"
            id="agreeTerms"
            name="agreeTerms"
            required
          >
          <label for="agreeTerms">
            I agree to the Terms of Service and Privacy Policy
          </label>
        </div>

        <button type="submit" class="btn-auth btn-auth-primary" id="signupBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        <p>
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-message" id="loadingMessage">Creating account...</div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Initialize signup page
    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('signupForm');
      const signupBtn = document.getElementById('signupBtn');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordStrengthBar = document.getElementById('passwordStrengthBar');

      // Password strength checker
      passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;
        let strength = 0;

        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;

        // Update strength bar
        passwordStrengthBar.className = 'password-strength-bar';
        if (strength === 0) {
          passwordStrengthBar.style.width = '0';
        } else if (strength <= 2) {
          passwordStrengthBar.classList.add('password-strength-weak');
        } else if (strength === 3) {
          passwordStrengthBar.classList.add('password-strength-medium');
        } else {
          passwordStrengthBar.classList.add('password-strength-strong');
        }
      });

      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const agreeTerms = document.getElementById('agreeTerms').checked;

        // Validation
        if (!email || !password || !confirmPassword) {
          showError('Please fill in all fields');
          return;
        }

        if (!isValidEmail(email)) {
          showError('Please enter a valid email address');
          return;
        }

        if (password.length < 8) {
          showError('Password must be at least 8 characters');
          return;
        }

        if (!/[A-Z]/.test(password)) {
          showError('Password must contain at least one uppercase letter');
          return;
        }

        if (!/[a-z]/.test(password)) {
          showError('Password must contain at least one lowercase letter');
          return;
        }

        if (!/[0-9]/.test(password)) {
          showError('Password must contain at least one number');
          return;
        }

        if (password !== confirmPassword) {
          showError('Passwords do not match');
          return;
        }

        if (!agreeTerms) {
          showError('Please agree to the Terms of Service');
          return;
        }

        signupBtn.disabled = true;
        showLoading('Creating account...');

        try {
          const response = await apiCall('/auth/signup', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });

          if (response.ok) {
            const data = await response.json();
            // Store token
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('userEmail', data.user.email);

            showSuccess('Account created successfully! Redirecting...');
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          } else {
            const error = await response.json();
            showError(error.error || 'Signup failed');
            signupBtn.disabled = false;
          }
        } catch (error) {
          showError('Connection error. Please try again.');
          signupBtn.disabled = false;
        } finally {
          hideLoading();
        }
      });

      // Check if already logged in
      if (localStorage.getItem('authToken')) {
        window.location.href = 'dashboard.html';
      }
    });

    function showError(message) {
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.textContent = message;
      errorAlert.classList.add('show');
      setTimeout(() => {
        errorAlert.classList.remove('show');
      }, 5000);
    }

    function showSuccess(message) {
      const successAlert = document.getElementById('successAlert');
      successAlert.textContent = message;
      successAlert.classList.add('show');
    }

    function showLoading(message) {
      document.getElementById('loadingMessage').textContent = message;
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }
  </script>
</body>
</html>
